[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  # Статические ресурсы - долгосрочное кеширование
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  # Изображения - среднесрочное кеширование
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  # Шрифты - долгосрочное кеширование
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # HTML - без кеширования для обновлений
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Deployment manifest — never cache. Consumed by the runtime update watcher.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/deploy-version.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

# Service Worker file — now a one-shot kill switch; never cache.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

# SPA route HTML (extension-less paths) — always revalidate.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/en/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/zh/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/about"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/company"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cnc-machines"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/ferroalloys"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cases"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Uploads
  for = "/lovable-uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Permanent redirect: /ru/company is a duplicate alias of the canonical /company.
# Netlify serves existing prerendered files (dist/en/index.html,
# dist/company/index.html, etc.) before applying these rules, so this does
# NOT interfere with prerendered language routes.
[[redirects]]
  from = "/ru/company"
  to = "/company"
  status = 301
  force = true

# SPA fallback for unknown routes only. `force = false` (default) means
# Netlify tries the filesystem first; prerendered HTML wins.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Gzip compression
[build.environment]
  NODE_VERSION = "18"

# Build optimization
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true